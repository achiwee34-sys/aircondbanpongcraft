<!--
  ════════════════════════════════════════════════════════════════
  PATCH: แทนที่ div#login-screen ใน index.html
  ════════════════════════════════════════════════════════════════
  
  วิธีใช้:
  1. ใน index.html ลบ block นี้ทั้งหมด:
       <!-- ========== LOGIN ========== --\>
       <div id="login-screen">
         ...
       </div>
  
  2. แทนด้วย code ด้านล่างนี้ทั้งหมด
  3. ไม่ต้องแก้ liff-auth.js, app-core.js อื่นๆ
  ════════════════════════════════════════════════════════════════
-->

<!-- ========== LIFF LANDING PAGE ========== -->
<div id="login-screen" style="transition:opacity 0.25s,transform 0.25s">
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800;900&display=swap');

/* ── override body for landing ── */
#login-screen {
  position:fixed;inset:0;z-index:100;overflow-y:auto;
  background:#0a0a0f;
  font-family:'Kanit',sans-serif;
  color:#fff;
}
/* BG */
#liff-bg-wrap { position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none }
.lbg { position:absolute;border-radius:50%;filter:blur(80px); }
.lbg-1{width:500px;height:500px;top:-150px;left:-100px;background:radial-gradient(circle,#c8102e,#7f000000 70%);opacity:0.35;animation:lbg-pulse 6s ease-in-out infinite alternate}
.lbg-2{width:400px;height:400px;bottom:-100px;right:-80px;background:radial-gradient(circle,#1a3a6e,#0d1f4000 70%);opacity:0.3;animation:lbg-pulse 6s 2s ease-in-out infinite alternate}
@keyframes lbg-pulse{0%{transform:scale(1);opacity:0.3}100%{transform:scale(1.15) translate(10px,-10px);opacity:0.45}}
.lbg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(200,16,46,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(200,16,46,.05) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:1}

/* ── Page content ── */
.liff-page {
  position:relative;z-index:10;
  min-height:100dvh;
  display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top,0px) + 24px) 20px calc(env(safe-area-inset-bottom,0px) + 32px);
}

/* Header */
.liff-header{display:flex;align-items:center;gap:14px;margin-bottom:28px;animation:sl-down .5s ease both}
.liff-logo{width:54px;height:54px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 8px 32px rgba(200,16,46,.4),0 0 0 1px rgba(255,255,255,.1);overflow:hidden}
.liff-brand-main{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:800;letter-spacing:.06em;line-height:1;color:#fff}
.liff-brand-sub{font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#ff2d4e;margin-top:4px}

/* Hero */
.liff-hero{margin-bottom:28px;animation:sl-down .6s .08s ease both}
.liff-hero-tag{font-size:.72rem;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.liff-hero-title{font-size:1.85rem;font-weight:900;line-height:1.15;letter-spacing:-.01em}
.liff-hero-title b{color:#ff2d4e}
.liff-hero-sub{font-size:.82rem;color:rgba(255,255,255,.5);margin-top:8px;line-height:1.5}

/* LINE card */
.liff-line-card{background:linear-gradient(135deg,rgba(6,199,85,.18),rgba(6,199,85,.06));border:1px solid rgba(6,199,85,.3);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:24px;cursor:pointer;transition:transform .15s;animation:sl-up .5s .15s ease both}
.liff-line-card:active{transform:scale(.98)}
.liff-line-card-avatar{width:44px;height:44px;border-radius:50%;border:2px solid rgba(6,199,85,.5);object-fit:cover;flex-shrink:0}
.liff-line-card-label{font-size:.65rem;font-weight:600;color:rgba(6,199,85,.7);letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.liff-line-card-name{font-size:.95rem;font-weight:700}

/* Section label */
.liff-section-lbl{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;animation:sl-up .5s .18s ease both}

/* Menu Grid */
.liff-menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.liff-btn{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:none;border:none;font-family:'Kanit',sans-serif;-webkit-tap-highlight-color:transparent;animation:pop-in .4s ease both}
.liff-btn:nth-child(1){animation-delay:.20s}
.liff-btn:nth-child(2){animation-delay:.26s}
.liff-btn:nth-child(3){animation-delay:.32s}
.liff-btn:nth-child(4){animation-delay:.38s}
.liff-btn:nth-child(5){animation-delay:.44s}
.liff-btn:nth-child(6){animation-delay:.50s}
.liff-circle{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s;overflow:hidden}
.liff-circle::before{content:'';position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,255,255,.15)}
.liff-circle::after{content:'';position:absolute;top:12%;left:18%;right:30%;height:28%;background:rgba(255,255,255,.2);border-radius:50%;filter:blur(5px);transform:rotate(-20deg)}
.liff-btn:active .liff-circle{transform:scale(.9)}
.liff-btn:hover .liff-circle{transform:scale(1.06)}
.liff-icon{font-size:1.85rem;position:relative;z-index:2;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.liff-lbl{font-size:.73rem;font-weight:700;color:#fff;text-align:center;line-height:1.2}
.liff-badge{position:absolute;top:-3px;right:-3px;width:20px;height:20px;background:#ff2d4e;border-radius:50%;font-size:.6rem;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;z-index:3;border:2px solid #0a0a0f;animation:b-pulse 2s ease-in-out infinite}
@keyframes b-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.lc-red   {background:linear-gradient(145deg,#ff2d4e,#b0001f);box-shadow:0 8px 28px rgba(200,16,46,.55),0 2px 8px rgba(0,0,0,.3)}
.lc-blue  {background:linear-gradient(145deg,#2d8fff,#0050cc);box-shadow:0 8px 28px rgba(45,143,255,.45),0 2px 8px rgba(0,0,0,.3)}
.lc-green {background:linear-gradient(145deg,#0fcc60,#06842f);box-shadow:0 8px 28px rgba(6,199,85,.45),0 2px 8px rgba(0,0,0,.3)}
.lc-orange{background:linear-gradient(145deg,#ff8c2d,#cc5500);box-shadow:0 8px 28px rgba(255,140,45,.45),0 2px 8px rgba(0,0,0,.3)}
.lc-purple{background:linear-gradient(145deg,#a64dff,#6200cc);box-shadow:0 8px 28px rgba(166,77,255,.45),0 2px 8px rgba(0,0,0,.3)}
.lc-teal  {background:linear-gradient(145deg,#00d4cc,#007a75);box-shadow:0 8px 28px rgba(0,212,204,.4),0 2px 8px rgba(0,0,0,.3)}

/* Divider */
.liff-divider{display:flex;align-items:center;gap:10px;margin:16px 0;animation:sl-up .5s .5s ease both}
.liff-divider::before,.liff-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}
.liff-divider span{font-size:.68rem;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.06em;white-space:nowrap}

/* Manual form */
.liff-form-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:18px;animation:sl-up .5s .55s ease both}
.liff-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:13px 16px;font-size:.9rem;font-weight:600;color:#fff;font-family:'Kanit',sans-serif;outline:none;margin-bottom:10px;transition:border-color .2s,background .2s}
.liff-input::placeholder{color:rgba(255,255,255,.3)}
.liff-input:focus{border-color:rgba(200,16,46,.5);background:rgba(255,255,255,.1)}
.liff-submit{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#ff2d4e,#c8102e);color:#fff;font-size:.95rem;font-weight:800;font-family:'Kanit',sans-serif;cursor:pointer;box-shadow:0 6px 24px rgba(200,16,46,.4);transition:transform .15s}
.liff-submit:active{transform:scale(.97)}
.liff-err{font-size:.8rem;color:#ff6b6b;text-align:center;margin-top:10px;min-height:18px;font-weight:600}
.liff-register-row{text-align:center;margin-top:14px;font-size:.78rem;color:rgba(255,255,255,.5);animation:sl-up .5s .6s ease both}
.liff-register-row button{background:none;border:none;color:#ff2d4e;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Kanit',sans-serif;text-decoration:underline}

/* Animations */
@keyframes sl-down{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes sl-up  {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop-in {from{opacity:0;transform:scale(.7)}to{opacity:1;transform:none}}

/* Ripple */
.liff-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);width:10px;height:10px;animation:lrip .5s ease-out forwards;pointer-events:none;z-index:10}
@keyframes lrip{to{transform:scale(4);opacity:0}}
</style>

<!-- BG layers -->
<div id="liff-bg-wrap">
  <div class="lbg lbg-1"></div>
  <div class="lbg lbg-2"></div>
</div>
<div class="lbg-grid"></div>

<!-- Content -->
<div class="liff-page">

  <!-- Header -->
  <div class="liff-header">
    <div class="liff-logo">
      <svg width="48" height="48" viewBox="0 0 88 88" fill="none">
        <defs>
          <clipPath id="llc"><rect width="88" height="88" rx="20"/></clipPath>
          <radialGradient id="llg" cx="25%" cy="25%" r="75%">
            <stop offset="0%" stop-color="#1e0505"/>
            <stop offset="100%" stop-color="#050505"/>
          </radialGradient>
        </defs>
        <g clip-path="url(#llc)">
          <rect width="88" height="88" fill="url(#llg)"/>
          <line x1="0" y1="44" x2="88" y2="44" stroke="#D0021B" stroke-width="0.9" opacity="0.28"/>
          <line x1="44" y1="0" x2="44" y2="88" stroke="#D0021B" stroke-width="0.9" opacity="0.28"/>
          <rect x="7" y="7" width="13" height="13" fill="#D0021B" rx="2"/>
          <rect x="68" y="68" width="13" height="13" fill="#D0021B" rx="2" opacity="0.6"/>
          <text x="44" y="60" text-anchor="middle" font-size="44" font-weight="900" fill="white" font-family="Arial Black,Arial">A</text>
        </g>
      </svg>
    </div>
    <div>
      <div class="liff-brand-main">AIRCONDITION</div>
      <div class="liff-brand-sub">BP PROCESS</div>
    </div>
  </div>

  <!-- Hero -->
  <div class="liff-hero">
    <div class="liff-hero-tag">ยินดีต้อนรับ</div>
    <div class="liff-hero-title">แจ้งซ่อม<b>แอร์</b><br>ได้ทันที</div>
    <div class="liff-hero-sub" id="liff-hero-sub">กดปุ่มด้านล่างเพื่อเริ่มใช้งาน</div>
  </div>

  <!-- LINE Profile Card -->
  <div class="liff-line-card" id="liff-line-card" style="display:none" onclick="liffGoLogin()">
    <img class="liff-line-card-avatar" id="liff-lc-avatar" src="" alt="" onerror="this.style.display='none'">
    <div style="flex:1">
      <div class="liff-line-card-label">เข้าสู่ระบบในฐานะ</div>
      <div class="liff-line-card-name" id="liff-lc-name">...</div>
    </div>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(6,199,85,0.6)" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><polyline points="12 5 19 12 12 19"/></svg>
  </div>

  <!-- Menu Section -->
  <div class="liff-section-lbl">เมนูหลัก</div>
  <div class="liff-menu-grid">

    <button class="liff-btn" onclick="liffMenu('new-ticket')">
      <div class="liff-circle lc-red" style="position:relative">
        <span class="liff-icon">🔧</span>
      </div>
      <div class="liff-lbl">แจ้งซ่อม</div>
    </button>

    <button class="liff-btn" onclick="liffMenu('my-tickets')">
      <div class="liff-circle lc-blue" style="position:relative">
        <span class="liff-icon">📋</span>
        <div class="liff-badge" id="liff-badge" style="display:none">0</div>
      </div>
      <div class="liff-lbl">งานของฉัน</div>
    </button>

    <button class="liff-btn" onclick="liffMenu('verify')">
      <div class="liff-circle lc-green">
        <span class="liff-icon">✅</span>
      </div>
      <div class="liff-lbl">ตรวจรับงาน</div>
    </button>

    <button class="liff-btn" onclick="liffMenu('search')">
      <div class="liff-circle lc-orange">
        <span class="liff-icon">🔍</span>
      </div>
      <div class="liff-lbl">ค้นหาเครื่อง</div>
    </button>

    <button class="liff-btn" onclick="liffMenu('history')">
      <div class="liff-circle lc-purple">
        <span class="liff-icon">📊</span>
      </div>
      <div class="liff-lbl">ประวัติซ่อม</div>
    </button>

    <button class="liff-btn" onclick="liffMenu('register')">
      <div class="liff-circle lc-teal">
        <span class="liff-icon">✍️</span>
      </div>
      <div class="liff-lbl">สมัครใช้งาน</div>
    </button>

  </div>

  <!-- Manual Login -->
  <div class="liff-divider"><span>หรือเข้าสู่ระบบด้วย Username</span></div>
  <div class="liff-form-box">
    <input class="liff-input" type="text" id="lu" placeholder="Username" autocomplete="username" autocapitalize="none"
      oninput="if(typeof clearLoginErr==='function')clearLoginErr()"/>
    <input class="liff-input" type="password" id="lp" placeholder="Password" autocomplete="current-password"
      oninput="if(typeof clearLoginErr==='function')clearLoginErr()"
      onkeydown="if(event.key==='Enter'){if(typeof doLogin==='function')doLogin();else document.getElementById('lerr').textContent='กำลังโหลด...';}"/>
    <button class="liff-submit" onclick="if(typeof doLogin==='function')doLogin();else document.getElementById('lerr').textContent='กำลังโหลด...'">
      เข้าสู่ระบบ
    </button>
    <div class="liff-err" id="lerr"></div>

    <!-- LINE login button จาก liff-auth.js inject ที่นี่ -->
    <div id="login-divider" style="display:none;align-items:center;gap:10px;margin:14px 0">
      <div style="flex:1;height:1px;background:rgba(255,255,255,.12)"></div>
      <span style="font-size:.72rem;color:rgba(255,255,255,.4);font-weight:600;white-space:nowrap">หรือเข้าสู่ระบบด้วย</span>
      <div style="flex:1;height:1px;background:rgba(255,255,255,.12)"></div>
    </div>
    <div id="line-login-btn-wrap" style="display:none"></div>
  </div>

  <div class="liff-register-row">
    <span>ยังไม่มีบัญชี? </span>
    <button onclick="if(typeof showRegister==='function')showRegister()">สมัครใช้งาน</button>
  </div>

</div><!-- /liff-page -->

<script>
// ── Ripple on circle buttons ──
document.addEventListener('click', function(e) {
  const c = e.target.closest('.liff-circle');
  if (!c) return;
  const r = document.createElement('div');
  r.className = 'liff-ripple';
  const rect = c.getBoundingClientRect();
  r.style.left = (e.clientX - rect.left - 5) + 'px';
  r.style.top  = (e.clientY - rect.top  - 5) + 'px';
  c.appendChild(r);
  setTimeout(() => r.remove(), 500);
});

// ── Update LINE card ──
function liffUpdateCard(profile) {
  if (!profile) return;
  const card = document.getElementById('liff-line-card');
  const avt  = document.getElementById('liff-lc-avatar');
  const nm   = document.getElementById('liff-lc-name');
  const sub  = document.getElementById('liff-hero-sub');
  if (avt) avt.src = profile.pictureUrl || '';
  if (nm)  nm.textContent = profile.displayName || '';
  if (card) card.style.display = 'flex';
  if (sub)  sub.textContent = 'สวัสดี ' + (profile.displayName || '') + ' 👋';
}

function liffGoLogin() {
  if (typeof doLoginWithLine === 'function') doLoginWithLine();
}

// ── Menu Action ──
function liffMenu(action) {
  if (action === 'register') {
    if (typeof showRegister === 'function') showRegister();
    return;
  }
  // ตรวจ session
  try {
    const s = JSON.parse(localStorage.getItem(typeof SESSION_KEY!=='undefined'?SESSION_KEY:'aircon_session') || '{}');
    if (!s.exp || s.exp < Date.now()) {
      // ยังไม่ login → ลอง LINE login
      if (typeof _liffProfile !== 'undefined' && _liffProfile) {
        liffGoLogin();
        // หลัง login จะ initApp เอง
      } else {
        if (typeof showToast === 'function') showToast('⚠️ กรุณาเข้าสู่ระบบก่อน');
      }
      return;
    }
  } catch(e) {}

  // ซ่อน login screen
  const ls = document.getElementById('login-screen');
  if (ls) ls.style.display = 'none';
  const app = document.getElementById('app');
  if (app) app.classList.add('visible');

  // navigate
  const map = {
    'new-ticket': () => typeof goPage==='function' && goPage('new'),
    'my-tickets': () => typeof goPage==='function' && goPage('tickets'),
    'verify':     () => { if(typeof goPage==='function'){goPage('tickets');setTimeout(()=>typeof setFilter==='function'&&setFilter('status','done'),250);} },
    'search':     () => typeof goPage==='function' && goPage('search'),
    'history':    () => typeof goPage==='function' && goPage('tickets'),
  };
  const fn = map[action];
  if (fn) setTimeout(fn, 100);
}

// ── Update badge after app loads ──
window.addEventListener('appReady', function() {
  try {
    if (typeof db==='undefined'||!db.tickets||typeof CU==='undefined'||!CU) return;
    const n = db.tickets.filter(t=>t.reporterId===CU.id&&['new','assigned','accepted','inprogress','waiting_part'].includes(t.status)).length;
    const b = document.getElementById('liff-badge');
    if (b) { b.textContent=n; b.style.display=n>0?'flex':'none'; }
  } catch(e){}
});

// ── Expose for liff-auth.js to call ──
// liff-auth.js เรียก renderLinLoginButton() ซึ่ง inject ลง #line-login-btn-wrap
// และ liffUpdateCard จะอัพเดต profile card ด้วย
window._liffLandingUpdateCard = liffUpdateCard;
</script>

</div><!-- /login-screen -->
